{% extends "base.html" %}

{% block title %}Editar matricula{% endblock %}

{% block content %}
<section class="page-title">
  <div>
    <p class="eyebrow">Edicao</p>
    <h1>Editar matricula</h1>
  </div>
</section>

<form class="panel edit-panel" method="post">
  <label>
    Aluno
    <select name="aluno_id" required>
      {% for aluno in alunos %}
        <option value="{{ aluno.id }}" {% if matricula.aluno_id == aluno.id %}selected{% endif %}>{{ aluno.nome }} - {{ aluno.matricula }}</option>
      {% endfor %}
    </select>
  </label>
  <label>
    Disciplina
    <select name="disciplina_id" required>
      {% for disciplina in disciplinas %}
        <option value="{{ disciplina.id }}" {% if matricula.disciplina_id == disciplina.id %}selected{% endif %}>{{ disciplina.nome }} - {{ disciplina.codigo }}</option>
      {% endfor %}
    </select>
  </label>
  <div class="form-actions">
    <a class="button secondary" href="{{ url_for('matriculas') }}">Cancelar</a>
    <button type="submit">Salvar alteracoes</button>
  </div>
</form>
{% endblock %}
